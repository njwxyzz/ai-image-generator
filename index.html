<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AI Image Generator | Najwa</title>
        <!-- Linking Font Awesome for icons -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="container">
            <header class="header">
                <div class="logo-wrapper">
                    <div class="logo">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> <!-- Logo icon representing creativity and magic, fitting for an AI image generator. -->
                    </div>
                    <h1>AI Image Generator</h1>
                </div>


                <button class="theme-toggle">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </header>

            <div class="main-content">
                <form action="#" class="prompt-form">
                    <!-- Prompt Container-->
                    <div class="prompt-container">
                        <textarea  class="prompt-input" placeholder="Describe your imagination in detail..." required autofocus></textarea>
                        <button class="prompt-btn">
                            <i class="fa-solid fa-dice"></i>
                        </button>
                    </div>

                    <!-- Prompt Actions or Button -->
                    <div class="prompt-actions">
                        <div class="select-wrapper">
                            <select class="custom-select" required>
                                <option value="" selected disabled>Select Model</option>
                                <option value="black-forest-labs/FLUX.1-dev">FLUX.1-dev</option> <!-- FLUX.1-dev Model -->
                                <option value="black-forest-labs/FLUX.1-schnell">FLUX.1-schnell</option> <!-- FLUX.1-schnell Model -->
                                <option value="stabilityai/stable-diffusion-xl-base-1.0">Stable Diffusion XL</option> <!-- Stable Diffusion XL Model -->
                                <option value="runwayml/stable-diffusion-v1-5">Stable Diffusion v1.5</option> <!-- Stable Diffusion v1.5 Model -->
                                <option value="prompthero/openjourney">Openjourney</option> <!-- Openjourney Model -->
                            </select>
                        </div>

                        <div class="select-wrapper">
                            <select class="custom-select" required>
                                <option value="" selected disabled>Image Count</option>
                                <option value="1">1 Image</option>
                                <option value="2">2 Images</option>
                                <option value="3">3 Images</option>
                                <option value="4">4 Images</option>
                            </select>
                        </div>

                        <div class="select-wrapper">
                            <select class="custom-select" required>
                                <option value=""selected disabled>Aspect ratio</option>
                                <option value="1.1">Square (1:1)</option>
                                <option value="16/9">Landscape (16:9)</option>
                                <option value="9/16">Portrait (9:16)</option>
                            </select>
                        </div>


                        <button type="submit" class="generate-btn">
                            <i class="fa-solid fa-wand-magic-sparkles"></i>
                            Generate
                        </button>
                    </div>

                    <!-- Result -->
                     <div class="gallery-grid">
                        <div class="img-card loading">
                            <div class="status-container">
                                <div class="spinner"></div>
                                <p>Generating...</p>
                            </div>
                            <img src="test.jpg" class="result-img" />
                            <div class="img-overlay">
                                <button class="img-download-btn">
                                    <i class="fa-solid fa-download"></i>
                                </button>
                            </div>
                        </div>

                        <div class="img-card">
                            <img src="test.jpg" class="result-img" />
                            <div class="img-overlay">
                                <button class="img-download-btn">
                                    <i class="fa-solid fa-download"></i>
                                </button>
                            </div>
                        </div>

                        <div class="img-card">
                            <img src="test.jpg" class="result-img" />
                            <div class="img-overlay">
                                <button class="img-download-btn">
                                    <i class="fa-solid fa-download"></i>
                                </button>
                            </div>
                        </div>

                        <div class="img-card">
                            <img src="test.jpg" class="result-img" />
                            <div class="img-overlay">
                                <button class="img-download-btn">
                                    <i class="fa-solid fa-download"></i>
                                </button>
                            </div>
                        </div>

                     </div>
                </form>
            </div>
        </div>
    </body>
</html>
